{% extends "admin/base.html" %}
{% load i18n %}

{% block usertools %}
<!-- Language switcher for admin -->
<form method="post" action="{% url 'set_language' %}" id="adminLangForm" style="display:inline;">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    <input type="hidden" name="language" id="adminLangInput" value="">
</form>

<span style="margin-right: 12px; display: inline-flex; align-items: center; gap: 4px;">
    {% get_current_language as CURRENT_LANG %}
    {% for lang_code, lang_name in LANGUAGES %}
    <button type="button"
        onclick="document.getElementById('adminLangInput').value='{{ lang_code }}'; document.getElementById('adminLangForm').submit();"
        style="
            background: {% if CURRENT_LANG == lang_code %}rgba(139,92,246,0.25){% else %}transparent{% endif %};
            border: 1px solid {% if CURRENT_LANG == lang_code %}#8b5cf6{% else %}rgba(255,255,255,0.2){% endif %};
            color: {% if CURRENT_LANG == lang_code %}#c4b5fd{% else %}rgba(255,255,255,0.6){% endif %};
            font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px;
            cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
            transition: all 0.2s;
        "
        onmouseover="this.style.borderColor='#8b5cf6'; this.style.color='#c4b5fd';"
        onmouseout="if('{{ CURRENT_LANG }}' !== '{{ lang_code }}') { this.style.borderColor='rgba(255,255,255,0.2)'; this.style.color='rgba(255,255,255,0.6)'; }"
    >{{ lang_code|upper }}</button>
    {% endfor %}
</span>

{{ block.super }}
{% endblock %}
